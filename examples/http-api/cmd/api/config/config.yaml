app:
  name: goupter-api-example
  version: 1.0.0
  env: development

server:
  http:
    host: 0.0.0.0
    port: 8080

log:
  level: debug
  format: console
  output: stdout

database:
  driver: mysql
  host: localhost
  port: 3306
  database: goupter_example
  username: root
  password: "root123"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

auth:
  type: jwt
  config:
    secret_key: "secretkey"
    issuer: "goupter-example"
    access_token_ttl: "2h"
